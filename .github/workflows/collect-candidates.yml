# PortföyAI fırsat adayı üreticisi (kısa + uzun vade).
# Veri toplayıcıdan AYRI ve SEYREK çalışır: her sembol için 2 yıllık geçmiş
# grafik + quoteSummary çekildiğinden tur pahalıdır (~3-5 dk). Bu yüzden 6
# saatte bir koşar — bkz. collect-data.yml (fiyat/kur/haber, 20 dk'da bir).
# Gerekli secrets (repo Settings → Secrets and variables → Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
name: Aday Ureticisi

on:
  schedule:
    - cron: '0 */6 * * *' # her 6 saatte bir (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch: {} # Actions sekmesinden elle de tetiklenebilir

jobs:
  candidates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      # Tüm projeyi değil, yalnızca toplayıcının ihtiyacı olan paketleri kur (hız + dakika tasarrufu)
      - name: Bağımlılık kur
        run: npm install yahoo-finance2 @anthropic-ai/sdk --no-save --no-audit --no-fund

      - name: Fırsat adaylarını üret ve Supabase'e yaz
        run: node server/collect.js
        env:
          COLLECT_MODE: candidates
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
