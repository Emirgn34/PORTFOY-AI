# PortföyAI fırsat adayı üreticisi (kısa + uzun vade) — 3 fazlı tüm ABD taraması.
# Veri toplayıcıdan AYRI ve SEYREK çalışır: Faz 1 tüm ABD evrenini (~6000) toplu
# fiyatla tarar, Faz 2 en iyi 300'e hafif analiz + haber, Faz 3 vitrindeki ~90'a
# 2 yıllık ZORUNLU analiz + AI haber yapar. Bu yüzden tur uzundur; 6 saatte bir
# koşar — bkz. collect-data.yml (fiyat/kur/haber, 20 dk'da bir).
# Gerekli secrets (repo Settings → Secrets and variables → Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY (+ AI için ANTHROPIC_API_KEY opsiyonel)
name: Aday Ureticisi

on:
  schedule:
    - cron: '0 */6 * * *' # her 6 saatte bir (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch: {} # Actions sekmesinden elle de tetiklenebilir

jobs:
  candidates:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      # Tüm projeyi değil, yalnızca toplayıcının ihtiyacı olan paketleri kur (hız + dakika tasarrufu)
      - name: Bağımlılık kur
        run: npm install yahoo-finance2 @anthropic-ai/sdk --no-save --no-audit --no-fund

      - name: Fırsat adaylarını üret ve Supabase'e yaz
        run: node server/collect.js
        env:
          COLLECT_MODE: candidates
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Vitrin adaylarının haberlerine AI duygu/özet için (yoksa AI sessizce atlanır)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
