# PortföyAI bulut veri toplayıcı.
# 20 dakikada bir fiyat + kur + haberleri Supabase'e yazar (PC kapalıyken de çalışır).
# Gerekli secrets (repo Settings → Secrets and variables → Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
name: Veri Toplayici

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch: {} # Actions sekmesinden elle de tetiklenebilir

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Tüm projeyi değil, yalnızca toplayıcının ihtiyacı olan paketi kur (hız + dakika tasarrufu)
      - name: Bağımlılık kur
        run: npm install yahoo-finance2 --no-save --no-audit --no-fund

      - name: Veri topla ve Supabase'e yaz
        run: node server/collect.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
